<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Webamp - Reproductor Retro</title>
  <style>
    /* Estilos para el fondo */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-image: url('bgrnd.jpg');
      /* Ruta de la imagen de fondo */
      background-size: cover;
      /* Ajusta la imagen para cubrir toda la pantalla */
      background-position: center;
      /* Centra la imagen */
      background-repeat: no-repeat;
      /* Evita que la imagen se repita */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* Altura completa de la ventana */

      /* Optimizaciones para móvil (App nativa) */
      overflow: hidden;
      /* Evita que la pantalla se mueva */
      touch-action: none;
      /* Previene el scrolling nativo o zoom con gestos */
      -webkit-user-select: none;
      /* Previene selección de texto en iOS/Android */
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      /* Quita el cuadro azul al tocar */
    }

    /* Contenedor principal */
    #app {
      width: 100%;
      height: 100%;
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(1.1);
      /* Ligero aumento para mejorar los toques en pantallas pequeñas */
    }
  </style>
</head>

<body>
  <!-- Contenedor para Webamp -->
  <div id="app"></div>

  <!-- Script para inicializar Webamp con soporte visual Butterchurn (Milkdrop) -->
  <script type="module">
    import Webamp from "https://unpkg.com/webamp@^2/butterchurn";

    document.addEventListener("DOMContentLoaded", () => {
      const tracks = [
        {
          metaData: {
            artist: "DJ Mike Llama",
            title: "Llama Whippin' Intro",
          },
          url: "https://cdn.jsdelivr.net/gh/captbaritone/webamp@43434d82cfe0e37286dbbe0666072dc3190a83bc/mp3/llama-2.91.mp3",
          duration: 5.322286,
        },
        {
          metaData: {
            title: "I Wanna be Somebody - Luisiño",
            artist: "W.A.S.P.",
          },
          url: "WASPIwannabesomebody.mp3", // Asegúrate de que la ruta sea correcta
          duration: 214.750, // Duración en segundos
        },
        {
          metaData: {
            title: "Rock Antenne - the best music in the world",
            artist: "Radio",
          },
          url: "https://stream.rockantenne.de/rockantenne/stream/mp3",
          duration: 0
        },
        {
          metaData: {
            title: "Heavy Metal - the best music in the world",
            artist: "Radio",
          },
          url: "https://s1-webradio.rockantenne.de/heavy-metal/stream/mp3",
          duration: 0
        }
      ];

      const webamp = new Webamp({
        initialTracks: tracks,
        initialSkin: {
          url: "Luis.wsz", // Asegúrate de que la ruta sea correcta
        },
      });

      webamp.renderWhenReady(document.getElementById("app"))
        .then(() => console.log("Webamp con Milkdrop ha sido renderizado correctamente."))
        .catch((error) => console.error("Error al renderizar Webamp:", error));
    });
  </script>
</body>

</html>
