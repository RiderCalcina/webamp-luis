<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Webamp - Reproductor Retro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* Estilos para el fondo */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-image: url('bgrnd.jpg');
      /* Ruta de la imagen de fondo */
      background-size: cover;
      /* Ajusta la imagen para cubrir toda la pantalla */
      background-position: center;
      /* Centra la imagen */
      background-repeat: no-repeat;
      /* Evita que la imagen se repita */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* Altura completa de la ventana */

      /* Optimizaciones para móvil (App nativa) */
      overflow: hidden;
      /* Evita que la pantalla se mueva */
      touch-action: none;
      /* Previene el scrolling nativo o zoom con gestos */
      -webkit-user-select: none;
      /* Previene selección de texto en iOS/Android */
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      /* Quita el cuadro azul al tocar */
    }

    /* Contenedor principal */
    #app {
      width: 100%;
      height: 100%;
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(1.3) translateY(-12%); /* Subir el reproductor para dar espacio abajo */
    }

    /* Estilo para el contenedor de links (Botones) */
    .bottom-links {
        position: fixed;
        bottom: 7%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: row; /* Uno al lado del otro */
        justify-content: center;
        align-items: center;
        gap: 12px;
        width: 100%;
        max-width: 380px;
    }

    .bottom-links a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 45px;
        height: 45px;
        padding: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 229, 255, 0.4);
        color: #00e5ff;
        text-decoration: none;
        border-radius: 50%;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 1.3rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        position: relative;
    }

    .bottom-links a:hover {
        background: rgba(0, 229, 255, 0.15);
        border-color: #00e5ff;
        color: #fff;
        transform: scale(1.1) rotate(360deg);
        box-shadow: 0 10px 30px rgba(0, 229, 255, 0.4);
        text-shadow: 0 0 15px #00e5ff;
    }

    /* Tooltip estilizado */
    .bottom-links a::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 130%;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: rgba(0, 0, 0, 0.9);
        color: #00e5ff;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.7rem;
        font-family: 'Inter', sans-serif;
        text-transform: none;
        letter-spacing: 0.5px;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        pointer-events: none;
        border: 1px solid rgba(0, 229, 255, 0.3);
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .bottom-links a:hover::after {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }

    .bottom-links a:active {
        transform: scale(0.95);
    }

    /* Ocultar el separador si existe */
    .bottom-links span {
        display: none;
    }
  </style>
</head>

<body>
  <!-- Botón de actualización único con símbolo y tooltip -->
  <div class="bottom-links">
    <a href="#" onclick="window.location.reload(); return false;" data-tooltip="Actualizar Reproductor">↻</a>
  </div>

  <!-- Contenedor para Webamp -->
  <div id="app"></div>

  <!-- Script para inicializar Webamp con soporte visual Butterchurn (Milkdrop) -->
  <script type="module">
    import Webamp from "https://unpkg.com/webamp@^2/butterchurn";

    document.addEventListener("DOMContentLoaded", () => {
      const tracks = [
        {
          metaData: {
            artist: "DJ Mike Llama",
            title: "Llama Whippin' Intro",
          },
          url: "https://cdn.jsdelivr.net/gh/captbaritone/webamp@43434d82cfe0e37286dbbe0666072dc3190a83bc/mp3/llama-2.91.mp3",
          duration: 5.322286,
        },
        {
          metaData: {
            title: "I Wanna be Somebody - Luisiño",
            artist: "W.A.S.P.",
          },
          url: "WASPIwannabesomebody.mp3", // Asegúrate de que la ruta sea correcta
          duration: 214.750, // Duración en segundos
        },
        {
          metaData: {
            title: "Rock Antenne - the best music in the world",
            artist: "Radio",
          },
          url: "https://stream.rockantenne.de/rockantenne/stream/mp3",
          duration: 0
        },
        {
          metaData: {
            title: "Heavy Metal - the best music in the world",
            artist: "Radio",
          },
          url: "https://s1-webradio.rockantenne.de/heavy-metal/stream/mp3",
          duration: 0
        }
      ];

      const webamp = new Webamp({
        initialTracks: tracks,
        initialSkin: {
          url: "Luis.wsz", // Asegúrate de que la ruta sea correcta
        },
      });

      // --- Media Session API Implementation ---
      const updateMediaSession = (track) => {
        if ('mediaSession' in navigator && track) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: track.title || "Canción desconocida",
            artist: track.artist || "Artista",
            album: "Webamp Retro",
            artwork: [
              { src: 'bgluis.jpg', sizes: '96x96', type: 'image/jpeg' },
              { src: 'bgluis.jpg', sizes: '128x128', type: 'image/jpeg' },
              { src: 'bgluis.jpg', sizes: '192x192', type: 'image/jpeg' },
              { src: 'bgluis.jpg', sizes: '256x256', type: 'image/jpeg' },
              { src: 'bgluis.jpg', sizes: '384x384', type: 'image/jpeg' },
              { src: 'bgluis.jpg', sizes: '512x512', type: 'image/jpeg' },
            ]
          });
        }
      };

      // --- Prevenir suspensión de AudioContext ---
      const silencer = document.createElement('audio');
      silencer.loop = true;
      silencer.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="; // Silencio corto

      // Truco del "Wake Lock" y "Silent Audio" para evitar que el sistema mate el proceso
      let wakeLock = null;
      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
          }
          // Reproducir silencio para mantener el thread de audio vivo en móviles
          silencer.play().catch(e => console.log("Silent audio blocked"));
        } catch (err) {
          console.error(`${err.name}, ${err.message}`);
        }
      }

      // Manejar cambios de pista
      webamp.onTrackDidChange((track) => {
        if (track && track.metaData) {
          updateMediaSession(track.metaData);
        }
        // Intentar activar Wake Lock al cambiar de pista (inicio de reproducción)
        requestWakeLock();
      });

      // Nota: webamp@2 no soporta .on("play"), usamos el cambio de pista para el estado inicial.
      // Para un control más fino del estado de reproducción (play/pause) en MediaSession:
      if (webamp.store) {
        let lastStatus = null;
        webamp.store.subscribe(() => {
          const status = webamp.store.getState().media.status;
          if (status !== lastStatus) {
            lastStatus = status;
            if ('mediaSession' in navigator) {
              navigator.mediaSession.playbackState = status === "PLAYING" ? "playing" : "paused";
            }
            if (status === "PLAYING") {
              requestWakeLock();
            } else {
              if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
              }
              silencer.pause();
            }
          }
        });
      }

      // Configurar controles de Media Session
      if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', () => webamp.play());
        navigator.mediaSession.setActionHandler('pause', () => webamp.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => webamp.previous());
        navigator.mediaSession.setActionHandler('nexttrack', () => webamp.next());
        navigator.mediaSession.setActionHandler('seekbackward', (details) => {
          // Webamp no tiene seek nativo directo por segundos, pero podríamos implementarlo
        });
        navigator.mediaSession.setActionHandler('seekforward', (details) => {
          // Opcional
        });
      }

      // Manejar cambios de visibilidad

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          // Reanudar AudioContext si el navegador lo suspendió
          if (webamp && webamp.store) {
            // Webamp no expone AudioContext directamente de forma fácil, 
            // pero suele recuperarse al interactuar o al volver a ser visible.
          }
        }
      });

      webamp.renderWhenReady(document.getElementById("app"))
        .then(() => {
          console.log("Webamp con Milkdrop ha sido renderizado correctamente.");
        })
        .catch((error) => console.error("Error al renderizar Webamp:", error));
    });
  </script>
</body>

</html>
